name: Broken link
description: Report a dead or mislabeled link (Drive, GitHub, Discuss, library)
title: "[link] "
labels: ["links"]
body:
  - type: markdown
    attributes:
      value: |
        If a §8 company Drive folder is labeled “OA folder”, say so — the correct label is **LC archive (legacy)**.
  - type: input
    id: page
    attributes:
      label: Page that contains the bad link
      placeholder: Study_Guide/topics/OS.md or README.md
    validations:
      required: true
  - type: input
    id: dead_url
    attributes:
      label: Dead or wrong URL
      placeholder: https://...
    validations:
      required: true
  - type: input
    id: replacement
    attributes:
      label: Replacement URL (optional)
      placeholder: https://...
  - type: textarea
    id: notes
    attributes:
      label: Extra notes
      description: HTTP status, paywall, or “needs LC archive (legacy) relabel”.
    validations:
      required: false
